---
- name: Create openwisp group {{ openwisp_group }}
  ansible.builtin.group:
    name: "{{ openwisp_group }}"
    state: present

- name: Create openwisp user {{ openwisp_user }}
  ansible.builtin.user:
    name: "{{ openwisp_user }}"
    shell: /sbin/nologin
    state: present
    group: "{{ openwisp_group }}"

- name: Add sudo permissions for Wireguard and Network Manager commands
  ansible.builtin.template:
    src: "sudoers.d/openwisp_user"
    dest: "/etc/sudoers.d/{{ openwisp_group }}"
    mode: "0440"
